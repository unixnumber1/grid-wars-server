<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>GRID WARS</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      background: #111;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #222;
      z-index: 1000;
      flex-shrink: 0;
    }

    #header h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #f5c518;
    }

    #header-status {
      font-size: 11px;
      color: #666;
    }

    #map {
      flex: 1;
      width: 100%;
    }

    /* Bottom panel */
    #bottom-panel {
      background: #111;
      border-top: 1px solid #222;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 1000;
      flex-shrink: 0;
    }

    #balance-display {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #balance-display .icon { font-size: 18px; }

    #balance-display .coins {
      font-size: 18px;
      font-weight: 700;
      color: #f5c518;
    }

    #balance-display .label {
      font-size: 10px;
      color: #555;
      line-height: 1;
    }

    .btn {
      background: #1e1e1e;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active { background: #2a2a2a; }
    .btn.primary { background: #2a4a2a; border-color: #3d7a3d; color: #6fcf6f; }
    .btn.primary:active { background: #1e3a1e; }
    .btn.danger { background: #4a1e1e; border-color: #8a3030; color: #e06060; }
    .btn.danger:active { background: #3a1010; }
    .btn.yellow { background: #3a3000; border-color: #806a00; color: #f5c518; }
    .btn.yellow:active { background: #2a2200; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Popup */
    #popup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 2000;
      align-items: flex-end;
      justify-content: center;
    }

    #popup-overlay.open { display: flex; }

    #popup-card {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 18px 18px 0 0;
      width: 100%;
      max-width: 480px;
      padding: 20px;
      animation: slideUp 0.2s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    #popup-card h2 { font-size: 16px; margin-bottom: 4px; }
    #popup-card .subtitle { font-size: 12px; color: #666; margin-bottom: 16px; }

    .popup-stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #1e1e1e;
      font-size: 13px;
    }

    .popup-stat .val { font-weight: 600; color: #f5c518; }

    .popup-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .popup-actions .btn { flex: 1; text-align: center; padding: 12px; font-size: 14px; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #222;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      z-index: 3000;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Leaflet marker overrides */
    .leaflet-marker-icon { border: none !important; background: none !important; }

    .marker-emoji {
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      cursor: pointer;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.8));
    }

    /* HQ setup overlay */
    #hq-prompt {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 2500;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      text-align: center;
      padding: 32px;
    }

    #hq-prompt.open { display: flex; }
    #hq-prompt h2 { font-size: 22px; }
    #hq-prompt p { color: #888; font-size: 14px; line-height: 1.6; }

    /* Loading overlay */
    #loading {
      position: fixed;
      inset: 0;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      z-index: 9999;
    }

    #loading h1 { font-size: 28px; font-weight: 900; letter-spacing: 4px; color: #f5c518; }
    #loading p { color: #555; font-size: 13px; }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #222;
      border-top-color: #f5c518;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Loading screen -->
<div id="loading">
  <h1>GRID WARS</h1>
  <div class="spinner"></div>
  <p id="loading-text">Initializing...</p>
</div>

<!-- HQ placement prompt -->
<div id="hq-prompt">
  <div style="font-size:48px">&#x1F3DB;&#xFE0F;</div>
  <h2>Place Your Headquarters</h2>
  <p>You need a headquarters to start playing.<br>
     Walk to a location and press the button below<br>
     to place your HQ at your current position.</p>
  <button class="btn primary" id="btn-place-hq" style="font-size:15px;padding:14px 28px;">
    &#x1F3DB;&#xFE0F; Place HQ Here
  </button>
</div>

<!-- Header -->
<div id="header">
  <h1>&#x26A1; GRID WARS</h1>
  <span id="header-status">Locating...</span>
</div>

<!-- Map -->
<div id="map"></div>

<!-- Bottom panel -->
<div id="bottom-panel">
  <div id="balance-display">
    <span class="icon">&#x1F4B0;</span>
    <div>
      <div class="coins" id="coin-display">0</div>
      <div class="label">HQ COINS</div>
    </div>
  </div>
  <button class="btn yellow" id="btn-build-mine" disabled>&#x26CF;&#xFE0F; Build Mine</button>
  <button class="btn primary" id="btn-collect" disabled>&#x1F4B0; Collect</button>
</div>

<!-- Generic popup -->
<div id="popup-overlay">
  <div id="popup-card">
    <h2 id="popup-title"></h2>
    <div class="subtitle" id="popup-subtitle"></div>
    <div id="popup-stats"></div>
    <div class="popup-actions" id="popup-actions"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ─────────────────────────────────────────────
//  Telegram WebApp bootstrap
// ─────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
tg?.ready();
tg?.expand();

// Use let so boot() can populate the resolved value for all subsequent calls
let TG_ID   = tg?.initDataUnsafe?.user?.id   || null;
let TG_NAME = tg?.initDataUnsafe?.user?.username || 'unknown';

// ─────────────────────────────────────────────
//  Constants (mirrors server-side lib/income.js)
// ─────────────────────────────────────────────
const RATE_PER_LEVEL   = [1, 2, 4, 7, 11, 16, 22, 29, 37, 46];
const UPGRADE_COST     = [0, 50, 150, 300, 500, 800, 1200, 1800, 2500, 3500];
const MAX_LEVEL        = 10;
const HQ_COIN_LIMIT    = 10000;
const CAPTURE_RADIUS   = 50;   // meters
const MINE_PLACE_RADIUS = 500; // meters
const MAP_REFRESH_MS   = 8000;
const GPS_REFRESH_MS   = 5000;

// ─────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────
let state = {
  player: null,
  hq: null,
  mines: [],           // player's own mines (from /api/player/init)
  mapBuildings: { headquarters: [], mines: [] },
  playerPos: null,     // { lat, lng }
};

// ─────────────────────────────────────────────
//  Utility helpers
// ─────────────────────────────────────────────
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function getCellId(lat, lng) {
  return `${Math.floor(lat * 1000)}_${Math.floor(lng * 1000)}`;
}

function calcAccumulated(level, lastCollectedISO) {
  const rate = RATE_PER_LEVEL[level - 1];
  const elapsed = (Date.now() - new Date(lastCollectedISO).getTime()) / 1000;
  return Math.floor(rate * Math.max(0, elapsed));
}

function showToast(msg, duration = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

function setLoadingText(t) {
  document.getElementById('loading-text').textContent = t;
}

async function apiFetch(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'API error');
  return data;
}

// ─────────────────────────────────────────────
//  Map setup
// ─────────────────────────────────────────────
const map = L.map('map', {
  zoomControl: false,
  attributionControl: false,
}).setView([55.75, 37.61], 16);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  className: 'map-tiles',
}).addTo(map);

// Make tiles dark-ish via CSS filter
const style = document.createElement('style');
style.textContent = '.map-tiles { filter: brightness(0.55) saturate(0.7) invert(0.05); }';
document.head.appendChild(style);

L.control.zoom({ position: 'topright' }).addTo(map);

// Player position marker
const playerIcon = L.divIcon({
  html: '<div class="marker-emoji" style="font-size:20px">&#x1F535;</div>',
  className: '',
  iconSize: [32, 32],
  iconAnchor: [16, 16],
});
let playerMarker = null;

// Building markers registry
const buildingMarkers = {}; // id → L.marker

// ─────────────────────────────────────────────
//  Emoji icon factories
// ─────────────────────────────────────────────
function makeIcon(emoji, size = 28) {
  return L.divIcon({
    html: `<div class="marker-emoji" style="font-size:${size}px">${emoji}</div>`,
    className: '',
    iconSize: [36, 36],
    iconAnchor: [18, 18],
  });
}

const ICONS = {
  hqOwn:    makeIcon('&#x1F7E2;', 26), // green circle + building look
  hqOther:  makeIcon('&#x26AA;', 26),
  mineOwn:  makeIcon('&#x1F7E1;', 24),
  mineCap:  makeIcon('&#x1F534;', 24),
  mineOther:makeIcon('&#x26AA;', 22),
};

// ─────────────────────────────────────────────
//  Rendering buildings on map
// ─────────────────────────────────────────────
function clearMarkers() {
  Object.values(buildingMarkers).forEach(m => map.removeLayer(m));
  Object.keys(buildingMarkers).forEach(k => delete buildingMarkers[k]);
}

function renderBuildings() {
  clearMarkers();
  const { headquarters, mines } = state.mapBuildings;
  const playerId = state.player?.id;
  const pos = state.playerPos;

  // HQs
  for (const hq of headquarters) {
    const isOwn = hq.player_id === playerId;
    const icon  = isOwn ? ICONS.hqOwn : ICONS.hqOther;
    const lbl   = isOwn ? '&#x1F3DB;&#xFE0F; Your HQ' : `&#x1F3DB;&#xFE0F; ${hq.players?.username || 'Enemy'}'s HQ`;
    const marker = L.marker([hq.lat, hq.lng], { icon })
      .addTo(map)
      .on('click', () => showHqPopup(hq, isOwn));
    buildingMarkers[`hq_${hq.id}`] = marker;
  }

  // Mines
  for (const mine of mines) {
    const isOwn = mine.owner_id === playerId;
    let canCapture = false;

    if (!isOwn && pos) {
      const dist = haversine(pos.lat, pos.lng, mine.lat, mine.lng);
      canCapture = dist <= CAPTURE_RADIUS;
    }

    const icon = isOwn ? ICONS.mineOwn : (canCapture ? ICONS.mineCap : ICONS.mineOther);

    const marker = L.marker([mine.lat, mine.lng], { icon })
      .addTo(map)
      .on('click', () => showMinePopup(mine, isOwn, canCapture));
    buildingMarkers[`mine_${mine.id}`] = marker;
  }
}

// ─────────────────────────────────────────────
//  Popup helpers
// ─────────────────────────────────────────────
function openPopup(title, subtitle, stats, actions) {
  document.getElementById('popup-title').innerHTML = title;
  document.getElementById('popup-subtitle').textContent = subtitle;

  const statsEl = document.getElementById('popup-stats');
  statsEl.innerHTML = '';
  for (const [label, val] of stats) {
    const row = document.createElement('div');
    row.className = 'popup-stat';
    row.innerHTML = `<span>${label}</span><span class="val">${val}</span>`;
    statsEl.appendChild(row);
  }

  const actEl = document.getElementById('popup-actions');
  actEl.innerHTML = '';
  for (const btn of actions) {
    const b = document.createElement('button');
    b.className = `btn ${btn.cls || ''}`;
    b.innerHTML = btn.label;
    if (btn.disabled) b.disabled = true;
    b.addEventListener('click', () => { closePopup(); btn.action(); });
    actEl.appendChild(b);
  }

  // Close button
  const closeBtn = document.createElement('button');
  closeBtn.className = 'btn';
  closeBtn.textContent = 'Close';
  closeBtn.addEventListener('click', closePopup);
  actEl.appendChild(closeBtn);

  document.getElementById('popup-overlay').classList.add('open');
}

function closePopup() {
  document.getElementById('popup-overlay').classList.remove('open');
}

document.getElementById('popup-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('popup-overlay')) closePopup();
});

// ─────────────────────────────────────────────
//  HQ popup
// ─────────────────────────────────────────────
function showHqPopup(hq, isOwn) {
  if (isOwn) {
    openPopup(
      '&#x1F3DB;&#xFE0F; Your Headquarters',
      `Cell: ${hq.cell_id}`,
      [
        ['Coins stored', `${hq.coins} / ${HQ_COIN_LIMIT}`],
      ],
      []
    );
  } else {
    const owner = hq.players?.username || 'Unknown';
    openPopup(
      '&#x1F3DB;&#xFE0F; Enemy Headquarters',
      `Owner: ${owner}`,
      [],
      []
    );
  }
}

// ─────────────────────────────────────────────
//  Mine popup
// ─────────────────────────────────────────────
function showMinePopup(mine, isOwn, canCapture) {
  const rate = RATE_PER_LEVEL[mine.level - 1];
  const accumulated = calcAccumulated(mine.level, mine.last_collected);

  if (isOwn) {
    const nextCost = mine.level < MAX_LEVEL ? UPGRADE_COST[mine.level] : null;
    const hqCoins  = state.hq?.coins ?? 0;
    const canUpgrade = nextCost !== null && hqCoins >= nextCost;

    openPopup(
      `&#x26CF;&#xFE0F; Your Mine (Lv ${mine.level})`,
      `Cell: ${mine.cell_id}`,
      [
        ['Rate', `${rate} coins/sec`],
        ['Accumulated', `${accumulated} coins`],
        ['Next upgrade cost', nextCost !== null ? `${nextCost} coins` : 'MAX LEVEL'],
        ['HQ balance', `${hqCoins}`],
      ],
      nextCost !== null ? [
        {
          label: `&#x2B06;&#xFE0F; Upgrade (${nextCost})`,
          cls: 'yellow',
          disabled: !canUpgrade,
          action: () => doUpgrade(mine.id),
        },
      ] : []
    );
  } else if (canCapture) {
    const owner = mine.players?.username || 'Unknown';
    openPopup(
      `&#x26CF;&#xFE0F; Enemy Mine (Lv ${mine.level})`,
      `Owner: ${owner} • You are close enough!`,
      [
        ['Rate', `${rate} coins/sec`],
        ['Level', mine.level],
      ],
      [
        {
          label: '&#x2694;&#xFE0F; Capture',
          cls: 'danger',
          action: () => doCapture(mine.id),
        },
      ]
    );
  } else {
    const owner = mine.players?.username || 'Unknown';
    const pos = state.playerPos;
    const dist = pos ? Math.round(haversine(pos.lat, pos.lng, mine.lat, mine.lng)) : '?';
    openPopup(
      `&#x26CF;&#xFE0F; Enemy Mine (Lv ${mine.level})`,
      `Owner: ${owner} • ${dist}m away`,
      [
        ['Rate', `${rate} coins/sec`],
        ['To capture', `Get within ${CAPTURE_RADIUS}m`],
      ],
      []
    );
  }
}

// ─────────────────────────────────────────────
//  Map click → build mine on empty cell
// ─────────────────────────────────────────────
map.on('click', e => {
  if (!state.player || !state.hq || !state.playerPos) return;
  const { lat, lng } = e.latlng;

  // Don't trigger if clicked on marker
  const pos = state.playerPos;
  const dist = haversine(pos.lat, pos.lng, lat, lng);
  if (dist > MINE_PLACE_RADIUS) return;

  // Check if cell is empty
  const cellId = getCellId(lat, lng);
  const occupied = [
    ...state.mapBuildings.mines.map(m => m.cell_id),
    ...state.mapBuildings.headquarters.map(h => h.cell_id),
  ].includes(cellId);

  if (occupied) return;

  openPopup(
    '&#x26CF;&#xFE0F; Empty Cell',
    `${Math.round(dist)}m from you`,
    [
      ['Cell ID', cellId],
      ['Distance', `${Math.round(dist)}m`],
    ],
    [
      {
        label: '&#x26CF;&#xFE0F; Build Mine Here',
        cls: 'yellow',
        action: () => doBuildMine(lat, lng),
      },
    ]
  );
});

// ─────────────────────────────────────────────
//  Actions
// ─────────────────────────────────────────────
async function doUpgrade(mineId) {
  try {
    const data = await apiFetch('/api/buildings/upgrade', {
      method: 'POST',
      body: JSON.stringify({ telegram_id: TG_ID, mine_id: mineId }),
    });
    if (state.hq) state.hq.coins = data.hq_coins;
    updateCoinDisplay();
    showToast(`&#x2B06;&#xFE0F; Upgraded to level ${data.mine.level}!`);
    await refreshMap();
  } catch (err) {
    showToast(`&#x274C; ${err.message}`);
  }
}

async function doCapture(mineId) {
  const pos = state.playerPos;
  if (!pos) return showToast('&#x274C; No GPS position');
  try {
    await apiFetch('/api/buildings/capture', {
      method: 'POST',
      body: JSON.stringify({
        telegram_id: TG_ID,
        mine_id: mineId,
        lat: pos.lat,
        lng: pos.lng,
        username: TG_NAME,
      }),
    });
    showToast('&#x2694;&#xFE0F; Mine captured!');
    await refreshAll();
  } catch (err) {
    showToast(`&#x274C; ${err.message}`);
  }
}

async function doBuildMine(lat, lng) {
  const pos = state.playerPos;
  if (!pos || pos.lat == null || pos.lng == null) {
    showToast('&#x274C; GPS not ready, wait a second');
    return;
  }
  if (!TG_ID) {
    showToast('&#x274C; Telegram ID not available');
    return;
  }
  const payload = {
    telegram_id: TG_ID,
    player_lat: pos.lat,
    player_lng: pos.lng,
    mine_lat: lat,
    mine_lng: lng,
  };
  console.log('Sending /api/buildings/mine:', payload);
  try {
    const data = await apiFetch('/api/buildings/mine', {
      method: 'POST',
      body: JSON.stringify(payload),
    });
    showToast('&#x26CF;&#xFE0F; Mine placed!');
    state.mines.push(data.mine);
    await refreshMap();
  } catch (err) {
    showToast(`&#x274C; ${err.message}`);
  }
}

async function doCollect() {
  document.getElementById('btn-collect').disabled = true;
  try {
    const data = await apiFetch('/api/economy/collect', {
      method: 'POST',
      body: JSON.stringify({ telegram_id: TG_ID }),
    });
    if (state.hq) state.hq.coins = data.hq_coins;
    updateCoinDisplay();
    showToast(`&#x1F4B0; Collected ${data.collected} coins!`);
    // Reset local mine last_collected timestamps
    const now = new Date().toISOString();
    for (const mine of state.mines) mine.last_collected = now;
    for (const mine of state.mapBuildings.mines) {
      if (mine.owner_id === state.player?.id) mine.last_collected = now;
    }
  } catch (err) {
    showToast(`&#x274C; ${err.message}`);
  } finally {
    document.getElementById('btn-collect').disabled = false;
  }
}

// ─────────────────────────────────────────────
//  HQ placement
// ─────────────────────────────────────────────
document.getElementById('btn-place-hq').addEventListener('click', async () => {
  const pos = state.playerPos;
  if (!pos) return showToast('&#x274C; Waiting for GPS...');
  try {
    const data = await apiFetch('/api/buildings/headquarters', {
      method: 'POST',
      body: JSON.stringify({ telegram_id: TG_ID, lat: pos.lat, lng: pos.lng }),
    });
    state.hq = data.headquarters;
    document.getElementById('hq-prompt').classList.remove('open');
    updateCoinDisplay();
    showToast('&#x1F3DB;&#xFE0F; Headquarters placed!');
    await refreshMap();
  } catch (err) {
    showToast(`&#x274C; ${err.message}`);
  }
});

// ─────────────────────────────────────────────
//  Build mine button (at player position)
// ─────────────────────────────────────────────
document.getElementById('btn-build-mine').addEventListener('click', () => {
  const pos = state.playerPos;
  if (!pos) return showToast('&#x274C; No GPS position');
  if (!state.hq) return showToast('&#x274C; Place HQ first');
  const cellId = getCellId(pos.lat, pos.lng);
  const occupied = [
    ...state.mapBuildings.mines.map(m => m.cell_id),
    ...state.mapBuildings.headquarters.map(h => h.cell_id),
  ].includes(cellId);
  if (occupied) return showToast('&#x274C; Cell already occupied');
  openPopup(
    '&#x26CF;&#xFE0F; Build Mine',
    'At your current position',
    [['Cell', cellId], ['Distance', '0m']],
    [{
      label: '&#x26CF;&#xFE0F; Confirm Build',
      cls: 'yellow',
      action: () => doBuildMine(pos.lat, pos.lng),
    }]
  );
});

document.getElementById('btn-collect').addEventListener('click', doCollect);

// ─────────────────────────────────────────────
//  Coin display
// ─────────────────────────────────────────────
function updateCoinDisplay() {
  document.getElementById('coin-display').textContent =
    state.hq ? state.hq.coins : '—';
}

// ─────────────────────────────────────────────
//  Map + data refresh
// ─────────────────────────────────────────────
async function refreshMap() {
  const pos = state.playerPos;
  if (!pos) return;
  try {
    const data = await apiFetch(`/api/map?lat=${pos.lat}&lng=${pos.lng}`);
    state.mapBuildings = data;
    renderBuildings();
  } catch (e) {
    console.error('Map refresh error:', e);
  }
}

async function refreshAll() {
  try {
    const data = await apiFetch('/api/player/init', {
      method: 'POST',
      body: JSON.stringify({ telegram_id: TG_ID, username: TG_NAME }),
    });
    state.player = data.player;
    state.hq     = data.headquarters;
    state.mines  = data.mines;
    updateCoinDisplay();
    await refreshMap();
  } catch (e) {
    console.error('Refresh error:', e);
  }
}

// ─────────────────────────────────────────────
//  GPS tracking
// ─────────────────────────────────────────────
function onPosition(pos) {
  const { latitude: lat, longitude: lng } = pos.coords;
  const isFirstFix = state.playerPos === null;
  state.playerPos = { lat, lng };

  if (!playerMarker) {
    playerMarker = L.marker([lat, lng], { icon: playerIcon, zIndexOffset: 1000 }).addTo(map);
    map.setView([lat, lng], 16);
  } else {
    playerMarker.setLatLng([lat, lng]);
  }

  document.getElementById('header-status').textContent =
    `${lat.toFixed(5)}, ${lng.toFixed(5)}`;

  // Enable action buttons on first GPS fix
  if (isFirstFix) {
    document.getElementById('btn-build-mine').disabled = false;
    document.getElementById('btn-collect').disabled = false;
  }
}

function onGpsError(err) {
  console.warn('GPS error:', err.message);
  document.getElementById('header-status').textContent = 'GPS unavailable';
}

// ─────────────────────────────────────────────
//  Boot sequence
// ─────────────────────────────────────────────
async function boot() {
  setLoadingText('Checking identity...');

  if (!TG_ID) {
    // Dev mode fallback — use a fixed test ID
    console.warn('No Telegram context. Using dev mode.');
    window._devMode = true;
  }

  const effectiveTgId = TG_ID || 999999999;
  const effectiveName = TG_NAME || 'dev_user';

  // Make effectiveTgId available to all action functions via the module-scoped lets
  TG_ID   = effectiveTgId;
  TG_NAME = effectiveName;

  setLoadingText('Loading player data...');
  try {
    const data = await apiFetch('/api/player/init', {
      method: 'POST',
      body: JSON.stringify({ telegram_id: effectiveTgId, username: effectiveName }),
    });
    state.player = data.player;
    state.hq     = data.headquarters;
    state.mines  = data.mines;
  } catch (err) {
    setLoadingText(`Error: ${err.message}`);
    return;
  }

  setLoadingText('Getting GPS...');

  // Request GPS
  if (!navigator.geolocation) {
    setLoadingText('Geolocation not supported');
    return;
  }

  navigator.geolocation.getCurrentPosition(async (pos) => {
    onPosition(pos);
    setLoadingText('Loading map...');
    await refreshMap();

    // Hide loading
    document.getElementById('loading').style.display = 'none';

    // Show HQ prompt if needed
    if (!state.hq) {
      document.getElementById('hq-prompt').classList.add('open');
    }

    updateCoinDisplay();

    // Start GPS watch
    navigator.geolocation.watchPosition(onPosition, onGpsError, {
      enableHighAccuracy: true,
      maximumAge: 3000,
      timeout: 10000,
    });

    // Periodic map refresh
    setInterval(refreshMap, MAP_REFRESH_MS);

  }, onGpsError, { enableHighAccuracy: true, timeout: 15000 });
}

// Use effectiveTgId inside async calls
// Patch: centralise resolved ID
(async () => {
  await boot();
})();
</script>
