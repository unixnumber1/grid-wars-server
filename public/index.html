<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>GRID WARS</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- H3 hex grid -->
  <script src="https://unpkg.com/h3-js/dist/h3-js.umd.js"></script>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      background: #1a1a2e;
      height: 48px;
      padding: 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 1000;
      flex-shrink: 0;
      box-shadow: 0 1px 6px rgba(0,0,0,0.5);
    }

    #header h1 {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #FFD700;
      white-space: nowrap;
    }

    #header-balance {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 20px;
      font-weight: 700;
      color: #FFD700;
    }

    #header-balance .bal-icon { font-size: 16px; }

    #btn-settings {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      width: 34px;
      height: 34px;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      color: #e0e0e0;
    }

    #map {
      flex: 1;
      width: 100%;
    }

    /* Bottom panel */
    #bottom-panel {
      background: #1a1a2e;
      height: 64px;
      padding: 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 1000;
      flex-shrink: 0;
      box-shadow: 0 -1px 6px rgba(0,0,0,0.5);
    }

    #player-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #player-avatar-wrap {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    #player-name-display {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }

    #player-level-display {
      font-size: 11px;
      color: #888;
      margin-top: 1px;
    }

    .btn {
      background: #1e1e1e;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active { background: #2a2a2a; }
    .btn.primary { background: #2a4a2a; border-color: #3d7a3d; color: #6fcf6f; }
    .btn.primary:active { background: #1e3a1e; }
    .btn.danger { background: #4a1e1e; border-color: #8a3030; color: #e06060; }
    .btn.danger:active { background: #3a1010; }
    .btn.yellow { background: #3a3000; border-color: #806a00; color: #f5c518; }
    .btn.yellow:active { background: #2a2200; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Popup */
    #popup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 2000;
      align-items: flex-end;
      justify-content: center;
    }

    #popup-overlay.open { display: flex; }

    #popup-card {
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px 16px 0 0;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 480px;
      padding: 20px;
      animation: slideUp 0.2s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    #popup-card h2 { font-size: 16px; margin-bottom: 4px; }
    #popup-card .subtitle { font-size: 12px; color: #666; margin-bottom: 16px; }

    .popup-stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #1e1e1e;
      font-size: 13px;
    }

    .popup-stat .val { font-weight: 600; color: #f5c518; }

    .popup-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .popup-actions .btn { flex: 1; text-align: center; padding: 10px 12px; font-size: 13px; min-width: 80px; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #222;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      z-index: 3000;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Leaflet marker overrides */
    .leaflet-marker-icon { border: none !important; background: none !important; }

    .marker-emoji {
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      cursor: pointer;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.8));
    }

    /* HQ setup overlay */
    #hq-prompt {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 2500;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      text-align: center;
      padding: 32px;
    }

    #hq-prompt.open { display: flex; }
    #hq-prompt h2 { font-size: 22px; }
    #hq-prompt p { color: #888; font-size: 14px; line-height: 1.6; }

    /* Loading overlay */
    #loading {
      position: fixed;
      inset: 0;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      z-index: 9999;
    }

    #loading h1 { font-size: 28px; font-weight: 900; letter-spacing: 4px; color: #f5c518; }
    #loading p { color: #555; font-size: 13px; }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #222;
      border-top-color: #f5c518;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Settings drawer */
    #settings-drawer {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: min(320px, 90vw);
      background: #1a1a2e;
      border-left: 1px solid rgba(255,255,255,0.08);
      z-index: 3000;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #settings-drawer.open { transform: translateX(0); }

    #settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    #settings-header h3 { font-size: 15px; font-weight: 700; }

    #btn-close-settings {
      background: none;
      border: none;
      color: #888;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      -webkit-tap-highlight-color: transparent;
    }

    #settings-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .settings-section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    #avatar-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
    }

    .avatar-cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      border-radius: 8px;
      border: 2px solid transparent;
      cursor: pointer;
      background: #1a1a1a;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s;
    }

    .avatar-cell.selected { border-color: #f5c518; }
    .avatar-cell:active { background: #2a2a2a; }

    /* Mine marker ring for capturable */
    .marker-capturable::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid #e06060;
      pointer-events: none;
    }

    /* HQ marker ring */
    .marker-hq-own::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid #3d7a3d;
      pointer-events: none;
    }

    .marker-hq-other::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid #555;
      pointer-events: none;
    }

    .marker-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Build menu cards */
    .build-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 14px 14px 12px;
      margin-bottom: 8px;
    }

    .build-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .build-card-desc {
      font-size: 12px;
      color: #888;
      padding-left: 28px;
      margin-bottom: 2px;
    }

    .build-card-meta {
      font-size: 12px;
      color: #f5c518;
      padding-left: 28px;
      margin-bottom: 10px;
    }

    /* Level-up notification */
    #levelup-notify {
      position: fixed;
      top: -70px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #000;
      font-size: 17px;
      font-weight: 800;
      padding: 12px 28px;
      border-radius: 30px;
      z-index: 4000;
      transition: top 0.4s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(255,215,0,0.5);
      pointer-events: none;
    }

    #levelup-notify.show { top: 60px; }

    /* Player level badge — clickable */
    #player-level-display { cursor: pointer; }
    #player-level-display:active { opacity: 0.7; }

    /* Online player marker ring */
    .marker-online::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid #4fc3f7;
      pointer-events: none;
    }
  </style>
</head>
<body>

<!-- Loading screen -->
<div id="loading">
  <h1>GRID WARS</h1>
  <div class="spinner"></div>
  <p id="loading-text">Initializing...</p>
</div>

<!-- HQ placement prompt -->
<div id="hq-prompt">
  <div style="font-size:48px">&#x1F3DB;&#xFE0F;</div>
  <h2>Place Your Headquarters</h2>
  <p>You need a headquarters to start playing.<br>
     Walk to a location and press the button below<br>
     to place your HQ at your current position.</p>
  <button class="btn primary" id="btn-place-hq" style="font-size:15px;padding:14px 28px;">
    &#x1F3DB;&#xFE0F; Place HQ Here
  </button>
</div>

<!-- Settings drawer -->
<div id="settings-drawer">
  <div id="settings-header">
    <h3>Settings</h3>
    <button id="btn-close-settings">&#x2715;</button>
  </div>
  <div id="settings-body">
    <div class="settings-section-title">Avatar</div>
    <div id="avatar-grid"></div>
  </div>
</div>

<!-- Header -->
<div id="header">
  <h1>&#x26A1; GRID WARS</h1>
  <div id="header-balance">
    <span class="bal-icon">&#x1F4B0;</span>
    <span id="coin-display">—</span>
  </div>
  <button id="btn-settings">&#x2699;&#xFE0F;</button>
</div>

<!-- Map -->
<div id="map"></div>

<!-- Bottom panel -->
<div id="bottom-panel">
  <div id="player-info">
    <div id="player-avatar-wrap"><span id="player-avatar-emoji">&#x1F43A;</span></div>
    <div>
      <div id="player-name-display">—</div>
      <div id="player-level-display">&#x423;&#x440;. 1</div>
    </div>
  </div>
  <div></div>
  <button class="btn primary" id="btn-collect" disabled>&#x1F4B0; Собрать</button>
</div>

<!-- Generic popup -->
<div id="popup-overlay">
  <div id="popup-card">
    <h2 id="popup-title"></h2>
    <div class="subtitle" id="popup-subtitle"></div>
    <div id="popup-stats"></div>
    <div class="popup-actions" id="popup-actions"></div>
  </div>
</div>

<!-- Level-up notification -->
<div id="levelup-notify"></div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ─────────────────────────────────────────────
//  Telegram WebApp bootstrap
// ─────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
tg?.ready();
tg?.expand();

// Use let so boot() can populate the resolved value for all subsequent calls
let TG_ID   = tg?.initDataUnsafe?.user?.id   || null;
let TG_NAME = tg?.initDataUnsafe?.user?.username || 'unknown';

// ─────────────────────────────────────────────
//  Constants — mirrors server-side lib/formulas.js
// ─────────────────────────────────────────────
const MINE_MAX_LEVEL    = 100;
const HQ_MAX_LEVEL      = 10;
const HQ_LIMITS = [10000,25000,50000,100000,200000,400000,700000,1200000,2000000,5000000];
function getHQLimit(lvl) { return HQ_LIMITS[Math.min(Math.max(lvl,1),HQ_MAX_LEVEL)-1]; }
const MINE_PLACE_RADIUS = 500;   // meters (visual only — actual check is H3 cell range)
const MAP_REFRESH_MS    = 5000;
const H3_RES            = 11;    // ~50m hex diameter
const H3_DISK_K         = 12;    // gridDisk radius for ~500m range

// Formulas (keep in sync with lib/formulas.js)
function mineRate(level) { return Math.floor(Math.pow(1.15, level - 1)); }
function mineUpgradeCost(level) { return level <= 1 ? 0 : Math.floor(50 * Math.pow(2.1, level - 1)); }

const HQ_LEVELS = [
  { level:1,  maxMines:10,  maxMineLevel:10,  upgradeCost:0 },
  { level:2,  maxMines:20,  maxMineLevel:20,  upgradeCost:5000 },
  { level:3,  maxMines:30,  maxMineLevel:30,  upgradeCost:15000 },
  { level:4,  maxMines:40,  maxMineLevel:40,  upgradeCost:35000 },
  { level:5,  maxMines:50,  maxMineLevel:50,  upgradeCost:70000 },
  { level:6,  maxMines:60,  maxMineLevel:60,  upgradeCost:120000 },
  { level:7,  maxMines:70,  maxMineLevel:70,  upgradeCost:200000 },
  { level:8,  maxMines:80,  maxMineLevel:80,  upgradeCost:350000 },
  { level:9,  maxMines:90,  maxMineLevel:90,  upgradeCost:600000 },
  { level:10, maxMines:100, maxMineLevel:100, upgradeCost:1000000 },
];
function hqConfig(lvl) { return HQ_LEVELS[Math.min(Math.max(lvl,1),HQ_MAX_LEVEL)-1]; }
function hqUpgradeCost(lvl) { return lvl >= HQ_MAX_LEVEL ? null : HQ_LEVELS[lvl].upgradeCost; }

const MINE_EMOJIS = ['🏠','🏡','🏘️','🏗️','🏢','🏬','🏭','🏰','🌆','🌇'];
function getMineEmoji(level) { return MINE_EMOJIS[Math.min(Math.floor((level-1)/10),9)]; }

const ALLOWED_AVATARS = [
  '🐱','🐯','🦁','🐻','🐼','🐨','🐶','🦊','🐺','🦝',
  '🐭','🐹','🐰','🦔','🐸','🐮','🐷','🐗','🦅','🦆',
  '🦉','🐧','🐦','🦚','🦜','🐤','🐲','🦋','🐠','🦈',
  '🐙','🦑','🦎','🐊','🐻‍❄️','🦦','🦥','🦘','🦙','🐑',
  '🐿️','🦫','🦬','🦣','🦩','🦤',
];

// ─────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────
let state = {
  player: null,
  hq: null,
  mines: [],           // player's own mines (from /api/player/init)
  mapBuildings: { headquarters: [], mines: [] },
  playerPos: null,     // { lat, lng }
};

// ─────────────────────────────────────────────
//  Utility helpers
// ─────────────────────────────────────────────
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function getCellId(lat, lng) {
  return h3.latLngToCell(lat, lng, H3_RES);
}

function getCellsInRange(lat, lng) {
  return new Set(h3.gridDisk(h3.latLngToCell(lat, lng, H3_RES), H3_DISK_K));
}

function getBuildingInCell(cellId) {
  const mine = state.mapBuildings.mines.find(m => m.cell_id === cellId);
  if (mine) return { ...mine, type: 'mine' };
  const hq = state.mapBuildings.headquarters.find(h => h.cell_id === cellId);
  if (hq) return { ...hq, type: 'hq' };
  return null;
}

function calcAccumulated(level, lastCollectedISO) {
  const elapsed = (Date.now() - new Date(lastCollectedISO).getTime()) / 1000;
  return Math.floor(mineRate(level) * Math.max(0, elapsed));
}

// XP / level helpers (mirrors lib/formulas.js)
function xpForLevel(level) { return Math.floor(100 * Math.pow(level, 1.9)); }

function showLevelUp(level) {
  const el = document.getElementById('levelup-notify');
  el.textContent = `\u2B06\uFE0F Уровень ${level}!`;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function showProfilePopup() {
  const p = state.player;
  if (!p) return;
  const level   = p.level ?? 1;
  const xp      = p.xp   ?? 0;
  const xpNext  = p.xpForNextLevel ?? xpForLevel(level);
  const radius  = p.buildRadius ?? 500;

  // XP within current level
  let xpAccum = 0;
  for (let l = 1; l < level; l++) xpAccum += xpForLevel(l);
  const xpThisLevel = xp - xpAccum;
  const pct = Math.min(100, Math.floor((xpThisLevel / xpNext) * 100));

  document.getElementById('popup-title').innerHTML =
    `${p.avatar || '\uD83D\uDC3A'} ${p.username || TG_NAME}`;
  document.getElementById('popup-subtitle').textContent = `Уровень ${level}`;

  const statsEl = document.getElementById('popup-stats');
  statsEl.innerHTML = `
    <div style="margin:14px 0 8px;">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:5px;">
        <span>${xpThisLevel.toLocaleString()} XP</span>
        <span>${xpNext.toLocaleString()} XP</span>
      </div>
      <div style="background:rgba(255,255,255,0.08);border-radius:6px;height:10px;overflow:hidden;">
        <div style="background:#FFD700;height:100%;width:${pct}%;border-radius:6px;transition:width 0.4s;"></div>
      </div>
      <div style="text-align:center;font-size:11px;color:#888;margin-top:4px;">${pct}%</div>
    </div>
  `;
  for (const [label, val] of [
    ['\uD83D\uDCCD Радиус постройки', `${radius}м`],
    ['\u2B50 Всего XP', xp.toLocaleString()],
  ]) {
    const row = document.createElement('div');
    row.className = 'popup-stat';
    row.innerHTML = `<span>${label}</span><span class="val">${val}</span>`;
    statsEl.appendChild(row);
  }

  const actEl = document.getElementById('popup-actions');
  actEl.innerHTML = '';
  const closeBtn = document.createElement('button');
  closeBtn.className = 'btn';
  closeBtn.style.cssText = 'width:100%;';
  closeBtn.textContent = 'Закрыть';
  closeBtn.addEventListener('click', closePopup);
  actEl.appendChild(closeBtn);

  document.getElementById('popup-overlay').classList.add('open');
}

function calcSellRefund(level) {
  let sum = 0;
  for (let i = 2; i <= level; i++) {
    sum += Math.floor(50 * Math.pow(2.1, i - 1));
  }
  return Math.floor(sum * 0.3);
}

function updatePlayerDisplay() {
  const avatar = state.player?.avatar || '🐺';
  const name   = state.player?.username || TG_NAME || '—';
  const level  = state.player?.level ?? 1;
  document.getElementById('player-avatar-emoji').textContent = avatar;
  document.getElementById('player-name-display').textContent = name;
  document.getElementById('player-level-display').textContent = `Ур. ${level}`;
}

function showToast(msg, duration = 2500) {
  const el = document.getElementById('toast');
  el.innerHTML = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

function setLoadingText(t) {
  document.getElementById('loading-text').textContent = t;
}

async function apiFetch(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'API error');
  return data;
}

// ─────────────────────────────────────────────
//  Map setup
// ─────────────────────────────────────────────

  zoomControl: false,
  attributionControl: false,
}).setView([55.75, 37.61], 16);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {

  className: 'map-tiles',
}).addTo(map);

// Make tiles dark-ish via CSS filter

style.textContent = '.map-tiles { filter: brightness(0.55) saturate(0.7) invert(0.05); }';
document.head.appendChild(style);

// zoom controls disabled (zoomControl: false in map init)

let playerMarker = null;
let playerZoneCircle = null;
const hexLayer = L.layerGroup().addTo(map);

// Building markers registry
const buildingMarkers = {}; // id → L.marker
const onlineMarkers  = {}; // player id → L.marker

// ─────────────────────────────────────────────
//  Emoji icon factories
// ─────────────────────────────────────────────
function makeMarkerIcon(html, size = 36) {
  return L.divIcon({
    html,
    className: '',
    iconSize: [size, size],
    iconAnchor: [size / 2, size / 2],
  });
}

function hqIcon(isOwn) {
  const ring = isOwn ? 'marker-hq-own' : 'marker-hq-other';
  return makeMarkerIcon(
    `<div class="marker-wrap ${ring}"><span style="font-size:24px">&#x26A1;</span></div>`, 40
  );
}

function mineIcon(level, state) {
  // state: 'own' | 'capturable' | 'other'
  const emoji = getMineEmoji(level);
  const size  = 28 + Math.min(Math.floor(level / 20), 4) * 2; // subtle size growth
  const ring  = state === 'capturable' ? 'marker-capturable' : '';
  const opacity = state === 'other' ? 'opacity:0.5;' : '';
  return makeMarkerIcon(
    `<div class="marker-wrap ${ring}"><span style="font-size:${size}px;${opacity}">${emoji}</span></div>`, 40
  );
}

function playerIcon(avatar) {
  const em = avatar || '🐺';
  return makeMarkerIcon(
    `<div class="marker-wrap"><span style="font-size:30px">${em}</span></div>`, 44
  );
}

function otherPlayerIcon(avatar) {
  const em = avatar || '🐺';
  return makeMarkerIcon(
    `<div class="marker-wrap marker-online"><span style="font-size:22px">${em}</span><span style="position:absolute;bottom:0;right:0;width:10px;height:10px;background:#00ff88;border-radius:50%;border:2px solid #000;"></span></div>`, 34
  );
}

// ─────────────────────────────────────────────
//  Hex grid + player zone
// ─────────────────────────────────────────────
function renderHexGrid(lat, lng) {
  hexLayer.clearLayers();

  const buildRadius = state.player?.buildRadius ?? 500;
  const dynDiskK    = Math.ceil(buildRadius / 43);

  // Zone circle (dynamic radius around player)
  if (!playerZoneCircle) {
    playerZoneCircle = L.circle([lat, lng], {
      radius: buildRadius,
      color: 'rgba(255, 200, 0, 0.3)',
      weight: 1,
      fillColor: 'rgba(255, 200, 0, 0.08)',
      fillOpacity: 1,
      interactive: false,
    }).addTo(map);
  } else {
    playerZoneCircle.setLatLng([lat, lng]);
    playerZoneCircle.setRadius(buildRadius);
  }

  // Only draw hexes when zoomed in enough (performance)
  if (map.getZoom() < 14) return;

  const cells = h3.gridDisk(h3.latLngToCell(lat, lng, H3_RES), dynDiskK);

  for (const cellId of cells) {
    const boundary = h3.cellToBoundary(cellId);
    const latLngs = boundary; // already [[lat,lng],...]

    const building = getBuildingInCell(cellId);
    let fillColor, fillOpacity;

    if (building?.type === 'mine' && building.is_mine) {
      fillColor = '#FFD700'; fillOpacity = 0.2;
    } else if (building?.type === 'mine') {
      fillColor = '#FF4444'; fillOpacity = 0.2;
    } else if (building?.type === 'hq' && building.is_mine) {
      fillColor = '#4fc3f7'; fillOpacity = 0.2;
    } else if (building?.type === 'hq') {
      fillColor = '#aaaaaa'; fillOpacity = 0.15;
    } else {
      fillColor = '#FFFFFF'; fillOpacity = 0.04;
    }

    const poly = L.polygon(latLngs, {
      color: 'rgba(255,255,255,0.15)',
      weight: 1,
      fillColor,
      fillOpacity,
    });

    poly.on('click', (e) => {
      L.DomEvent.stopPropagation(e);
      handleHexClick(cellId);
    });

    hexLayer.addLayer(poly);
  }
}

// Building types available for construction
const BUILDING_TYPES = [
  {
    emoji: '&#x26CF;&#xFE0F;',
    name: 'Шахта',
    desc: 'Генерирует монеты пассивно',
    meta: '1 монета/сек &bull; Бесплатно',
    build: (cellLat, cellLng) => doBuildMine(cellLat, cellLng),
  },
];

function showBuildMenu(cellLat, cellLng) {
  document.getElementById('popup-title').innerHTML = '&#x1F3D7;&#xFE0F; Построить';
  document.getElementById('popup-subtitle').textContent = 'Выбери тип постройки';

  const statsEl = document.getElementById('popup-stats');
  statsEl.innerHTML = '';

  for (const b of BUILDING_TYPES) {
    const card = document.createElement('div');
    card.className = 'build-card';
    card.innerHTML = `
      <div class="build-card-header"><span>${b.emoji}</span><span>${b.name}</span></div>
      <div class="build-card-desc">${b.desc}</div>
      <div class="build-card-meta">${b.meta}</div>
    `;
    const btn = document.createElement('button');
    btn.className = 'btn yellow';
    btn.style.cssText = 'width:100%;padding:10px;font-size:14px;';
    btn.innerHTML = '&#x26CF;&#xFE0F; Построить';
    btn.addEventListener('click', () => { closePopup(); b.build(cellLat, cellLng); });
    card.appendChild(btn);
    statsEl.appendChild(card);
  }

  const actEl = document.getElementById('popup-actions');
  actEl.innerHTML = '';
  const closeBtn = document.createElement('button');
  closeBtn.className = 'btn';
  closeBtn.style.cssText = 'width:100%;';
  closeBtn.textContent = 'Отмена';
  closeBtn.addEventListener('click', closePopup);
  actEl.appendChild(closeBtn);

  document.getElementById('popup-overlay').classList.add('open');
}

function handleHexClick(cellId) {
  if (!state.player || !state.playerPos) return;

  const building = getBuildingInCell(cellId);
  const [cellLat, cellLng] = h3.cellToLatLng(cellId);

  if (!building) {
    if (!state.hq) return showToast('❌ Сначала установи Штаб');
    showBuildMenu(cellLat, cellLng);
  } else if (building.type === 'mine') {
    const isOwn = building.is_mine ?? (building.owner_id === state.player?.id);
    const canCapture = building.can_capture ?? !isOwn;
    showMinePopup(building, isOwn, canCapture);
  } else if (building.type === 'hq') {
    const isOwn = building.is_mine ?? (building.player_id === state.player?.id);
    showHqPopup(building, isOwn);
  }
}

// ─────────────────────────────────────────────
//  Rendering buildings on map
// ─────────────────────────────────────────────
function clearMarkers() {
  Object.values(buildingMarkers).forEach(m => map.removeLayer(m));
  Object.keys(buildingMarkers).forEach(k => delete buildingMarkers[k]);
  Object.values(onlineMarkers).forEach(m => map.removeLayer(m));
  Object.keys(onlineMarkers).forEach(k => delete onlineMarkers[k]);
}

function renderBuildings() {
  clearMarkers();
  const { headquarters, mines } = state.mapBuildings;
  const playerId = state.player?.id;
  const pos = state.playerPos;

  // HQs — zIndexOffset: 0 (buildings lowest)
  for (const hq of headquarters) {
    const isOwn = hq.is_mine ?? (hq.player_id === playerId);
    const marker = L.marker([hq.lat, hq.lng], { icon: hqIcon(isOwn), zIndexOffset: 0 })
      .addTo(map)
      .on('click', () => showHqPopup(hq, isOwn));
    buildingMarkers[`hq_${hq.id}`] = marker;
  }

  // Mines — zIndexOffset: 0
  for (const mine of mines) {
    const isOwn = mine.is_mine ?? (mine.owner_id === playerId);
    const canCapture = mine.can_capture ?? (!isOwn && !!pos && getCellsInRange(pos.lat, pos.lng).has(mine.cell_id));
    const iconState = isOwn ? 'own' : (canCapture ? 'capturable' : 'other');
    const marker = L.marker([mine.lat, mine.lng], { icon: mineIcon(mine.level, iconState), zIndexOffset: 0 })
      .addTo(map)
      .on('click', () => showMinePopup(mine, isOwn, canCapture));
    buildingMarkers[`mine_${mine.id}`] = marker;
  }

  // Online players — zIndexOffset: 1000 (above buildings)
  for (const p of (state.mapBuildings.online_players || [])) {
    const minsAgo = Math.floor((Date.now() - new Date(p.last_seen).getTime()) / 60000);
    const label = minsAgo === 0 ? 'только что' : `${minsAgo} мин назад`;
    const marker = L.marker([p.last_lat, p.last_lng], { icon: otherPlayerIcon(p.avatar), zIndexOffset: 1000 })
      .addTo(map)
      .on('click', () => openPopup(
        `${p.avatar || '🐺'} ${p.username || 'Unknown'}`,
        `Онлайн ${label}`,
        [],
        []
      ));
    onlineMarkers[p.id] = marker;
  }
}

// ─────────────────────────────────────────────
//  Popup helpers
// ─────────────────────────────────────────────
function openPopup(title, subtitle, stats, actions) {
  document.getElementById('popup-title').innerHTML = title;
  document.getElementById('popup-subtitle').textContent = subtitle;

  const statsEl = document.getElementById('popup-stats');
  statsEl.innerHTML = '';
  for (const [label, val] of stats) {
    const row = document.createElement('div');
    row.className = 'popup-stat';
    row.innerHTML = `<span>${label}</span><span class="val">${val}</span>`;
    statsEl.appendChild(row);
  }

  const actEl = document.getElementById('popup-actions');
  actEl.innerHTML = '';
  for (const btn of actions) {
    const b = document.createElement('button');
    b.className = `btn ${btn.cls || ''}`;
    b.innerHTML = btn.label;
    if (btn.disabled) b.disabled = true;
    if (btn.fullWidth) b.style.flex = '1 0 100%';
    b.addEventListener('click', () => { closePopup(); btn.action(); });
    actEl.appendChild(b);
  }

  // Close button
  const closeBtn = document.createElement('button');
  closeBtn.className = 'btn';
  closeBtn.textContent = 'Закрыть';
  closeBtn.addEventListener('click', closePopup);
  actEl.appendChild(closeBtn);

  document.getElementById('popup-overlay').classList.add('open');
}

function closePopup() {
  document.getElementById('popup-overlay').classList.remove('open');
}

document.getElementById('popup-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('popup-overlay')) closePopup();
});

// ─────────────────────────────────────────────
//  HQ popup
// ─────────────────────────────────────────────
function showHqPopup(hq, isOwn) {
  if (isOwn) {
    const hqLvl   = hq.level ?? 1;
    const cfg     = hqConfig(hqLvl);
    const mineCount = state.mines.length;
    const nextCost  = hqUpgradeCost(hqLvl);
    const canUpgrade = nextCost !== null && hq.coins >= nextCost;
    openPopup(
      `&#x26A1; Headquarters Level ${hqLvl}`,
      `Cell: ${hq.cell_id}`,
      [
        ['&#x1F4B0; Balance', `${hq.coins.toLocaleString()} / ${getHQLimit(hqLvl).toLocaleString()}`],
        ['&#x26CF;&#xFE0F; Mines', `${mineCount} / ${cfg.maxMines}`],
        ['Max mine level', cfg.maxMineLevel],
        ['HQ upgrade cost', nextCost !== null ? nextCost.toLocaleString() : 'MAX LEVEL'],
      ],
      nextCost !== null ? [{
        label: `&#x2B06;&#xFE0F; Upgrade HQ (${nextCost.toLocaleString()})`,
        cls: 'primary',
        disabled: !canUpgrade,
        action: () => doUpgradeHq(),
      }] : []
    );
  } else {
    const owner = hq.players?.username || 'Unknown';
    let presenceText;
    if (hq.is_online) {
      presenceText = '🟢 Онлайн';
    } else {
      const lastSeen = hq.players?.last_seen;
      if (!lastSeen) {
        presenceText = 'Никогда';
      } else {
        const mins = Math.floor((Date.now() - new Date(lastSeen).getTime()) / 60000);
        if (mins < 1)         presenceText = 'Только что';
        else if (mins < 60)   presenceText = `${mins} мин назад`;
        else if (mins < 1440) presenceText = `${Math.floor(mins / 60)} ч назад`;
        else                  presenceText = `${Math.floor(mins / 1440)} дн назад`;
      }
    }
    openPopup(
      `&#x26A1; ${owner}`,
      `Штаб уровень ${hq.level ?? 1}`,
      [['&#x1F550; Был', presenceText]],
      []
    );
  }
}

// ─────────────────────────────────────────────
//  Mine popup
// ─────────────────────────────────────────────
function showMinePopup(mine, isOwn, canCapture) {
  const rate        = mineRate(mine.level);
  const accumulated = calcAccumulated(mine.level, mine.last_collected);
  const emoji       = getMineEmoji(mine.level);

  if (isOwn) {
    const hqLvl   = state.hq?.level ?? 1;
    const cfg     = hqConfig(hqLvl);
    const nextCost = mine.level < MINE_MAX_LEVEL ? mineUpgradeCost(mine.level + 1) : null;
    const hqCoins  = state.hq?.coins ?? 0;
    const levelCapHit = nextCost !== null && mine.level + 1 > cfg.maxMineLevel;
    const canUpgrade  = nextCost !== null && !levelCapHit && hqCoins >= nextCost;
    const upgradeLabel = levelCapHit
      ? `&#x2B06;&#xFE0F; Upgrade HQ first (cap: Lv${cfg.maxMineLevel})`
      : nextCost !== null
        ? `&#x2B06;&#xFE0F; Upgrade (${nextCost.toLocaleString()})`
        : 'MAX LEVEL';

    const refund   = calcSellRefund(mine.level);
    const sellTotal = refund + accumulated;

    openPopup(
      `${emoji} Шахта (Ур. ${mine.level})`,
      `Ваша шахта`,
      [
        ['Доход', `${rate.toLocaleString()} монет/сек`],
        ['Накоплено', `${accumulated.toLocaleString()} монет`],
        ['Стоимость апгрейда', nextCost !== null ? `${nextCost.toLocaleString()}` : 'МАКС'],
        ['Баланс штаба', hqCoins.toLocaleString()],
      ],
      [
        ...(nextCost !== null ? [{
          label: upgradeLabel,
          cls: 'yellow',
          disabled: !canUpgrade,
          fullWidth: true,
          action: () => doUpgrade(mine.id),
        }] : []),
        {
          label: `&#x1F4B8; Продать (+${sellTotal.toLocaleString()})`,
          cls: 'danger',
          action: () => doSellMine(mine.id),
        },
      ]
    );
  } else if (canCapture) {
    const owner = mine.players?.username || 'Unknown';
    openPopup(
      `${emoji} Enemy Mine (Lv ${mine.level})`,
      `Owner: ${owner} • In capture range!`,
      [
        ['Rate', `${rate.toLocaleString()} coins/sec`],
        ['Level', mine.level],
      ],
      [{
        label: '&#x2694;&#xFE0F; Capture',
        cls: 'danger',
        action: () => doCapture(mine.id),
      }]
    );
  } else {
    const owner = mine.players?.username || 'Unknown';
    const pos  = state.playerPos;
    const dist = pos ? Math.round(haversine(pos.lat, pos.lng, mine.lat, mine.lng)) : '?';
    openPopup(
      `${emoji} Enemy Mine (Lv ${mine.level})`,
      `Owner: ${owner} • ${dist}m away`,
      [
        ['Rate', `${rate.toLocaleString()} coins/sec`],
        ['To capture', 'Move within ~500m zone'],
      ],
      []
    );
  }
}

// ─────────────────────────────────────────────
//  Map click → outside-zone feedback or hex routing
// ─────────────────────────────────────────────
map.on('click', e => {
  if (!state.player || !state.playerPos) return;
  const { lat, lng } = e.latlng;
  const pos = state.playerPos;
  const dist = haversine(pos.lat, pos.lng, lat, lng);
  if (dist > MINE_PLACE_RADIUS) {
    openPopup('&#x1F4CD; Outside Zone', `${Math.round(dist)}m away — move closer`, [], []);
    return;
  }
  // Inside range: route to hex handler
  const cellId = getCellId(lat, lng);
  handleHexClick(cellId);
});

map.on('zoomend', () => {
  if (state.playerPos) renderHexGrid(state.playerPos.lat, state.playerPos.lng);
});

async function doUpgradeHq() {
  try {
    const data = await apiFetch('/api/buildings/headquarters-upgrade', {
      method: 'POST',
      body: JSON.stringify({ telegram_id: TG_ID }),
    });
    state.hq = data.headquarters;
    updateCoinDisplay();
    showToast(`⚡ Штаб улучшен до уровня ${data.headquarters.level}!`);
    await refreshMap();
  } catch (err) {
    showToast(`❌ ${err.message}`);
  }
}

async function doUpgrade(mineId) {
  const pos = state.playerPos;
  try {
    const data = await apiFetch('/api/buildings/upgrade', {
      method: 'POST',
      body: JSON.stringify({
        telegram_id: TG_ID,
        mine_id: mineId,
        lat: pos?.lat,
        lng: pos?.lng,
      }),
    });
    if (state.hq) state.hq.coins = data.hq_coins;
    updateCoinDisplay();
    showToast(`⬆️ Улучшено до уровня ${data.mine.level}!`);
    await refreshMap();
  } catch (err) {
    showToast(`❌ ${err.message}`);
  }
}

async function doSellMine(mineId) {
  try {
    const data = await apiFetch('/api/buildings/sell', {
      method: 'POST',
      body: JSON.stringify({ telegram_id: TG_ID, mine_id: mineId }),
    });
    if (state.hq) state.hq.coins = data.hq_coins;
    updateCoinDisplay();
    showToast(`✅ Шахта продана! +${data.total.toLocaleString()} монет`);
    state.mines = state.mines.filter(m => m.id !== mineId);
    await refreshMap();
  } catch (err) {
    showToast(`❌ ${err.message}`);
  }
}

async function doCapture(mineId) {
  const pos = state.playerPos;
  if (!pos) return showToast('❌ Нет GPS');
  try {
    await apiFetch('/api/buildings/capture', {
      method: 'POST',
      body: JSON.stringify({
        telegram_id: TG_ID,
        mine_id: mineId,
        lat: pos.lat,
        lng: pos.lng,
        username: TG_NAME,
      }),
    });
    showToast('⚔️ Шахта захвачена!');
    await refreshAll();
  } catch (err) {
    showToast(`❌ ${err.message}`);
  }
}

async function doBuildMine(lat, lng) {
  const pos = state.playerPos;
  if (!pos || pos.lat == null || pos.lng == null) {
    showToast('❌ GPS не готов, подожди');
    return;
  }
  if (!TG_ID) {
    showToast('❌ Telegram ID недоступен');
    return;
  }
  const payload = {
    telegram_id: TG_ID,
    player_lat: pos.lat,
    player_lng: pos.lng,
    mine_lat: lat,
    mine_lng: lng,
  };
  console.log('Sending /api/buildings/mine:', payload);
  try {
    const data = await apiFetch('/api/buildings/mine', {
      method: 'POST',
      body: JSON.stringify(payload),
    });
    showToast('⛏️ Шахта построена!');
    state.mines.push(data.mine);
    await refreshMap();
  } catch (err) {
    showToast(`❌ ${err.message}`);
  }
}

async function doCollect() {
  document.getElementById('btn-collect').disabled = true;
  const pos = state.playerPos;
  try {
    const data = await apiFetch('/api/economy/collect', {
      method: 'POST',
      body: JSON.stringify({ telegram_id: TG_ID, lat: pos?.lat, lng: pos?.lng }),
    });
    if (state.hq) state.hq.coins = data.hq_coins;
    updateCoinDisplay();
    showToast(`💰 Собрано ${data.collected.toLocaleString()} монет!`);
    // Reset local mine last_collected timestamps
    const now = new Date().toISOString();
    for (const mine of state.mines) mine.last_collected = now;
    for (const mine of state.mapBuildings.mines) {
      if (mine.owner_id === state.player?.id) mine.last_collected = now;
    }
  } catch (err) {
    showToast(`❌ ${err.message}`);
  } finally {
    document.getElementById('btn-collect').disabled = false;
  }
}

// ─────────────────────────────────────────────
//  Map + data refresh
// ─────────────────────────────────────────────
async function refreshMap() {
  const pos = state.playerPos;
  if (!pos) return;
  try {
    const tid = TG_ID ? `&telegram_id=${TG_ID}` : '';
    const data = await apiFetch(`/api/map?lat=${pos.lat}&lng=${pos.lng}${tid}`);
    console.log('[map] online_players received:', JSON.stringify(data.online_players));
    state.mapBuildings = data;
    renderBuildings();
    if (state.playerPos) renderHexGrid(state.playerPos.lat, state.playerPos.lng);
  } catch (e) {
    console.error('Map refresh error:', e);
  }
}

async function refreshAll() {
  const prevLevel = state.player?.level;
  try {
    const data = await apiFetch('/api/player/init', {
      method: 'POST',
      body: JSON.stringify({ telegram_id: TG_ID, username: TG_NAME }),
    });
    state.player = data.player;
    state.hq     = data.headquarters;
    state.mines  = data.mines;
    if (prevLevel && data.player.level > prevLevel) {
      showLevelUp(data.player.level);
    }
    updateCoinDisplay();
    updatePlayerDisplay();
    await refreshMap();
  } catch (e) {
    console.error('Refresh error:', e);
  }
}

// ─────────────────────────────────────────────
//  GPS tracking
// ─────────────────────────────────────────────
let _lastLocationReport = 0;

function onPosition(pos) {
  const { latitude: lat, longitude: lng } = pos.coords;
  const isFirstFix = state.playerPos === null;
  state.playerPos = { lat, lng };

  const pIcon = playerIcon(state.player?.avatar);
  if (!playerMarker) {
    playerMarker = L.marker([lat, lng], { icon: pIcon, zIndexOffset: 2000 }).addTo(map);
    map.setView([lat, lng], 13);
  } else {
    playerMarker.setLatLng([lat, lng]);
    playerMarker.setIcon(pIcon);
  }

  // Update hex grid and zone circle
  renderHexGrid(lat, lng);

  // Enable action buttons on first GPS fix
  if (isFirstFix) {
    document.getElementById('btn-collect').disabled = false;
  }

  // Report location to server every 5 s (don't flood on every watchPosition tick)
  const now = Date.now();
  if (TG_ID && now - _lastLocationReport > 5000) {
    _lastLocationReport = now;
    apiFetch('/api/player/location', {
      method: 'POST',
      body: JSON.stringify({ telegram_id: TG_ID, lat, lng }),
    }).catch(() => {}); // fire-and-forget, silent on error
  }
}

function onGpsError(err) {
  console.warn('GPS error:', err.message);
  document.getElementById('header-status').textContent = 'GPS unavailable';
}

// ─────────────────────────────────────────────
//  Boot sequence
// ─────────────────────────────────────────────
async function boot() {
  setLoadingText('Checking identity...');

  if (!TG_ID) {
    // Dev mode fallback — use a fixed test ID
    console.warn('No Telegram context. Using dev mode.');
    window._devMode = true;
  }

  const effectiveTgId = TG_ID || 999999999;
  const effectiveName = TG_NAME || 'dev_user';

  // Make effectiveTgId available to all action functions via the module-scoped lets
  TG_ID   = effectiveTgId;
  TG_NAME = effectiveName;

  setLoadingText('Loading player data...');
  try {
    const data = await apiFetch('/api/player/init', {
      method: 'POST',
      body: JSON.stringify({ telegram_id: effectiveTgId, username: effectiveName }),
    });
    state.player = data.player;
    state.hq     = data.headquarters;
    state.mines  = data.mines;
    updatePlayerDisplay();
  } catch (err) {
    setLoadingText(`Error: ${err.message}`);
    return;
  }

  setLoadingText('Getting GPS...');

  // Request GPS
  if (!navigator.geolocation) {
    setLoadingText('Geolocation not supported');
    return;
  }

  navigator.geolocation.getCurrentPosition(async (pos) => {
    onPosition(pos);
    setLoadingText('Loading map...');
    await refreshMap();

    // Hide loading
    document.getElementById('loading').style.display = 'none';

    // Show HQ prompt if needed
    if (!state.hq) {
      document.getElementById('hq-prompt').classList.add('open');
    }

    updateCoinDisplay();

    // Start GPS watch
    navigator.geolocation.watchPosition(onPosition, onGpsError, {
      enableHighAccuracy: true,
      maximumAge: 3000,
      timeout: 10000,
    });

    // Periodic map refresh
    setInterval(refreshMap, MAP_REFRESH_MS);

    // Periodic player/level refresh (detect XP gains, level-ups)
    setInterval(refreshAll, 30000);

  }, onGpsError, { enableHighAccuracy: true, timeout: 15000 });
}

// ─────────────────────────────────────────────
//  Settings drawer
// ─────────────────────────────────────────────
function buildAvatarGrid() {
  const grid = document.getElementById('avatar-grid');
  grid.innerHTML = '';
  const current = state.player?.avatar || '🐺';
  for (const em of ALLOWED_AVATARS) {
    const cell = document.createElement('div');
    cell.className = 'avatar-cell' + (em === current ? ' selected' : '');
    cell.textContent = em;
    cell.addEventListener('click', () => selectAvatar(em));
    grid.appendChild(cell);
  }
}

async function selectAvatar(avatar) {
  if (avatar === state.player?.avatar) return;
  try {
    const data = await apiFetch('/api/player/avatar', {
      method: 'POST',
      body: JSON.stringify({ telegram_id: TG_ID, avatar }),
    });
    state.player.avatar = data.player.avatar;
    buildAvatarGrid();
    updatePlayerDisplay();
    if (playerMarker && state.playerPos) {
      playerMarker.setIcon(playerIcon(avatar));
    }
    showToast(`Аватар обновлён: ${avatar}`);
  } catch (err) {
    showToast(`❌ ${err.message}`);
  }
}

document.getElementById('btn-settings').addEventListener('click', () => {
  buildAvatarGrid();
  document.getElementById('settings-drawer').classList.add('open');
});

document.getElementById('btn-close-settings').addEventListener('click', () => {
  document.getElementById('settings-drawer').classList.remove('open');
});

// ─────────────────────────────────────────────
//  Boot
// ─────────────────────────────────────────────
(async () => {
  await boot();
})();
</script>
